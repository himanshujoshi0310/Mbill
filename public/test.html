<!DOCTYPE html>
<html>
<head>
    <title>Test Purchase Bill Creation</title>
</head>
<body>
    <h1>Test Purchase Bill Creation</h1>
    <button onclick="testPurchaseBill()">Test Purchase Bill Creation</button>

    <script>
        async function testPurchaseBill() {
            const testData = {
                companyId: 'jayesh',
                billNumber: '2',
                billDate: '2024-01-15',
                supplierName: 'Test Supplier 2',
                supplierAddress: 'Test Address 2',
                supplierContact: '9876543210',
                krashakAnubandhNumber: 'KAN789012',
                productId: 'wheat',
                noOfBags: 5,
                hammali: 25,
                weight: 500,
                rate: 100,
                payableAmount: 50025,
                paidAmount: 25000,
                balance: 25025,
            };

            console.log('Sending test data:', testData);

            try {
                const response = await fetch('/api/purchase-bills', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData),
                });

                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response data:', result);

                if (response.ok) {
                    alert('Success: ' + JSON.stringify(result));
                } else {
                    alert('Error: ' + JSON.stringify(result));
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Fetch error: ' + error.message);
            }
        }
    </script>
</body>
</html>
