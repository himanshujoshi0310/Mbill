<!DOCTYPE html>
<html>
<head>
    <title>Clear Cookies</title>
</head>
<body>
    <h1>Clearing Authentication Cookies</h1>
    <p>Clearing all authentication cookies...</p>
    <script>
        // Clear all auth-related cookies
        const cookiesToClear = ['auth-token', 'refresh-token', 'userId', 'traderId', 'companyId'];
        
        cookiesToClear.forEach(cookieName => {
            document.cookie = `${cookieName}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Strict; Secure`;
        });
        
        console.log('Cookies cleared');
        
        // Redirect to login after 2 seconds
        setTimeout(() => {
            window.location.href = 'http://localhost:3001/login';
        }, 2000);
    </script>
</body>
</html>
